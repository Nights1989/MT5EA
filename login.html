<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北极星 | 登录</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .login-container { max-width: 500px; margin: 80px auto; }
        .tab-bar { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #3b82f6; }
        .tab { padding: 10px 20px; cursor: pointer; color: #9ca3af; font-weight: 600; }
        .tab.active { color: #00ffcc; border-bottom: 2px solid #00ffcc; }
        .form-group { margin-bottom: 20px; }
        .form-group input { width: 100%; }
        button { width: 100%; padding: 12px; font-size: 1rem; }
        .forgot-pwd { text-align: right; margin-top: 8px; }
        .forgot-pwd a { color: #60a5fa; font-size: 0.85rem; cursor: pointer; }
        .back-home { text-align: center; margin-top: 20px; }
        .back-home a { color: #8a9ac0; text-decoration: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1e2a3a; padding: 30px; border-radius: 24px; max-width: 400px; width: 90%; text-align: center; border: 1px solid #3b82f6; }
        .modal-content p { margin-bottom: 20px; }
        .modal-content button { width: auto; padding: 8px 20px; }
    </style>
</head>
<body class="public-page">
<div class="hero-bg"></div>
<div class="overlay"></div>
<div class="content">
    <div class="login-container">
        <div class="public-card">
            <h2 style="text-align:center;">北极星授权系统</h2>
            <div class="tab-bar" id="tabBar">
                <div class="tab active" data-tab="login">登录</div>
                <div class="tab" data-tab="register">注册</div>
            </div>

            <div id="loginForm">
                <div class="form-group"><input type="text" id="loginAccount" placeholder="用户名/邮箱"></div>
                <div class="form-group"><input type="password" id="loginPassword" placeholder="密码"></div>
                <div class="forgot-pwd"><a id="forgotPwdBtn">忘记密码？</a></div>
                <button id="doLogin">登录</button>
                <div id="loginError" class="error" style="margin-top:12px;"></div>
            </div>

            <div id="registerForm" class="hidden">
                <div class="form-group"><input type="text" id="regUsername" placeholder="用户名"></div>
                <div class="form-group"><input type="text" id="regNickname" placeholder="昵称"></div>
                <div class="form-group"><input type="email" id="regEmail" placeholder="邮箱"></div>
                <div class="form-group"><input type="password" id="regPassword" placeholder="密码"></div>
                <div class="form-group"><input type="text" id="regInviteCode" placeholder="邀请码"></div>
                <button id="doRegister">注册</button>
                <div id="regError" class="error" style="margin-top:12px;"></div>
                <div id="regSuccess" class="success" style="margin-top:12px;"></div>
            </div>

            <div class="back-home"><a href="/index.html">← 返回首页</a></div>
        </div>
    </div>
</div>

<div id="forgotModal" class="modal">
    <div class="modal-content">
        <h3>🔐 忘记密码</h3>
        <p>请提供您的 MT5 账号，并联系管理员重置密码。</p>
        <p>管理员邮箱：<strong>catalinanapelon755@gmail.com</strong></p>
        <button id="closeModalBtn" class="btn">关闭</button>
    </div>
</div>

<script src="/common.js"></script>
<script>
    const modal = document.getElementById('forgotModal');
    document.getElementById('forgotPwdBtn').addEventListener('click', () => {
        modal.style.display = 'flex';
    });
    document.getElementById('closeModalBtn').addEventListener('click', () => {
        modal.style.display = 'none';
    });
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    const tabs = document.querySelectorAll('#tabBar .tab');
    const loginDiv = document.getElementById('loginForm');
    const registerDiv = document.getElementById('registerForm');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            if (tab.dataset.tab === 'login') {
                loginDiv.classList.remove('hidden');
                registerDiv.classList.add('hidden');
            } else {
                loginDiv.classList.add('hidden');
                registerDiv.classList.remove('hidden');
            }
        });
    });

    document.getElementById('doLogin').addEventListener('click', async () => {
        const account = document.getElementById('loginAccount').value;
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');
        errorDiv.innerText = '';
        try {
            const res = await fetch(`${API_BASE}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ account, password })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            setToken(data.token);
            window.location.href = '/main.html';
        } catch (err) {
            errorDiv.innerText = err.message;
        }
    });

    document.getElementById('doRegister').addEventListener('click', async () => {
        const username = document.getElementById('regUsername').value.trim();
        const nickname = document.getElementById('regNickname').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const invite_code = document.getElementById('regInviteCode').value.trim();
        const errorDiv = document.getElementById('regError');
        const successDiv = document.getElementById('regSuccess');
        errorDiv.innerText = '';
        successDiv.innerText = '';
        if (!username || !nickname || !email || !password || !invite_code) {
            errorDiv.innerText = '所有字段都是必填的';
            return;
        }
        try {
            const res = await fetch(`${API_BASE}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, nickname, email, password, invite_code })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            successDiv.innerText = data.message;
            setTimeout(() => {
                document.querySelector('#tabBar .tab[data-tab="login"]').click();
                document.getElementById('loginAccount').value = username;
            }, 1500);
        } catch (err) {
            errorDiv.innerText = err.message;
        }
    });
</script>
<script src="/bg-slideshow.js"></script>
</body>
</html>
